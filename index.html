<body>

    <nav>

<main>
    <div class="login-box">

        <h2>Bem-vindo</h2>
        <p>Acesse o sistema</p>

        <input type="email" placeholder="Email">

        <div class="radio-group">
            <label class="radio-item">
                <input type="radio" name="tipo">
                <span>Administrador</span>
            </label>

            <label class="radio-item">
                <input type="radio" name="tipo">
                <span>Veterinário  </span>
            </label>
        </div>

        <button>Entrar</button>

    </div>
</main>
